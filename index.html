<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pricing table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <p class="plan-name">Basic</p>
        <p class="plan-price">$9/month</p>

        <ul>
          <li>5 projects</li>
          <li>Email Support</li>
          <li>Community Access</li>
        </ul>

        <button class="choose-plan-button">Choose Plan</button>
      </div>

      <div class="card second-card">
        <p class="plan-name">Pro</p>
        <p class="plan-price">$29/month</p>

        <ul>
          <li>50 projects</li>
          <li>Priority Support</li>
          <li>Community Access</li>
          <li>Advanced Analytics</li>
        </ul>

        <button class="get-started-button">Get Started</button>
      </div>

      <div class="card">
        <p class="plan-name">Enterprise</p>
        <p class="plan-price">$99/month</p>

        <ul>
          <li>Unlimited Projects</li>
          <li>24/7 Support</li>
          <li>Dedicated Manager</li>
          <li>Custom Integrations</li>
        </ul>

        <button class="choose-plan-button">Conatct Sales</button>
      </div>
    </div>
  </body>
</html>
